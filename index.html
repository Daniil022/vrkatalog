    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a14;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin: 20px 0; color: #7c6ff7; }
        .search-box {
            width: 100%; padding: 12px 20px; margin-bottom: 20px;
            background: #1a1a2e; border: 1px solid #333; color: white;
            border-radius: 25px; font-size: 16px; outline: none;
        }
        .search-box:focus { border-color: #7c6ff7; }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1a1a2e; border-radius: 12px; overflow: hidden;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(124,111,247,0.3); }
        .card img {
            width: 100%; height: 180px; object-fit: cover;
            background: #2a2a4a;
        }
        .card-info { padding: 15px; }
        .card-info h3 { margin: 0 0 8px 0; font-size: 18px; }
        .card-info .genre { color: #7c6ff7; font-size: 14px; margin-bottom: 5px; }
        .card-info .dev { color: #aaa; font-size: 12px; }
        .game-detail {
            background: #1a1a2e; border-radius: 12px; padding: 30px;
            margin-top: 20px;
        }
        .game-detail img { width: 100%; max-width: 600px; border-radius: 10px; margin-bottom: 20px; }
        .game-detail h2 { font-size: 28px; margin-bottom: 10px; }
        .game-detail .meta { color: #aaa; margin: 10px 0; }
        .back-btn {
            background: #7c6ff7; color: white; border: none;
            padding: 10px 25px; border-radius: 20px; cursor: pointer;
            font-size: 16px; margin-bottom: 20px;
        }
        .back-btn:hover { background: #6a5de0; }
        .stats { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
        .stat { background: #2a2a4a; padding: 10px 15px; border-radius: 8px; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: bold; }
    </style>
</head>

        // ============ РЕНДЕР ============
        const content = document.getElementById('content');
        const search = document.getElementById('search');
        let currentView = 'catalog';

        function renderCatalog(filter = '') {
            currentView = 'catalog';
            const filtered = games.filter(g => 
                !filter || 
                g.name.toLowerCase().includes(filter.toLowerCase()) ||
                g.genre.toLowerCase().includes(filter.toLowerCase()) ||
                g.dev.toLowerCase().includes(filter.toLowerCase())
            );

            let html = `<div style="margin:10px 0;color:#aaa;">Найдено: ${filtered.length} из ${games.length}</div>`;
            html += '<div class="games-grid">';
            filtered.forEach((game, index) => {
                const realIndex = games.indexOf(game);
                html += `
                <div class="card" onclick="showGame(${realIndex})">
                    <img src="${game.img}" alt="${game.name}" 
                         onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22180%22><rect fill=%22%232a2a4a%22 width=%22300%22 height=%22180%22/><text fill=%22white%22 font-size=%2218%22 x=%22150%22 y=%2290%22 text-anchor=%22middle%22>${game.name.slice(0,20)}</text></svg>';">
                    <div class="card-info">
                        <h3>${game.name}</h3>
                        <div class="genre">${game.genre}</div>
                        <div class="dev">${game.dev} • ${game.year}</div>
                    </div>
                </div>`;
            });
            html += '</div>';
            content.innerHTML = html;
        }

        function showGame(index) {
            currentView = 'detail';
            const game = games[index];
            content.innerHTML = `
                <button class="back-btn" onclick="renderCatalog('${search.value}')">← Назад к каталогу</button>
                <div class="game-detail">
                    <img src="${game.img}" alt="${game.name}"

                    <div class="meta">
                        <strong>Разработчик:</strong> ${game.dev}<br>
                        <strong>Жанр:</strong> ${game.genre}<br>
                        <strong>Год:</strong> ${game.year}
