        * { margin:0; padding:0; box-sizing:border-box; }
        body {

            background: radial-gradient(ellipse at 30% 20%, #1a1035, #090916 70%);
            color: var(--text);

            -webkit-font-smoothing: antialiased;
        }

        }
        .header {
            display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
            gap:1.5rem; backdrop-filter:blur(20px);
            background:rgba(15,15,30,0.7); border:1px solid var(--border);
            border-radius:24px; padding:1.5rem 2rem; box-shadow:0 15px 30px rgba(0,0,0,0.5);
        }
        .logo {
            font-size:2rem; font-weight:700;
            background:linear-gradient(135deg,#c4a8ff,#7c6ff7);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            display:flex; align-items:center; gap:0.5rem;
        }
        .search-box {
            position:relative; flex:1; min-width:250px; max-width:400px;
        }
        .search-box input {
            width:100%; background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15); border-radius:50px;
            padding:0.9rem 1.8rem 0.9rem 3rem; font-size:0.95rem;
            color:white; backdrop-filter:blur(10px); outline:none;
            transition:0.3s; font-family:inherit;
        }
        .search-box input:focus {
            border-color:var(--accent); box-shadow:0 0 25px rgba(124,111,247,0.5);
        }
        .search-icon { position:absolute; left:1.2rem; top:50%; transform:translateY(-50%); }
        .filters { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.5rem; }
        .filter-chip {
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
            color:#c0c0e0; padding:0.5rem 1.1rem; border-radius:30px;
            font-size:0.8rem; font-weight:500; cursor:pointer; transition:0.2s;
        }
        .filter-chip:hover { background:rgba(124,111,247,0.25); border-color:var(--accent); }
        .filter-chip.active { background:var(--accent); border-color:var(--accent); color:white; font-weight:600; }
        .games-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(270px,1fr));
            gap:1.5rem;
        }
        .card {
            background:var(--card); backdrop-filter:blur(20px);
            border-radius:20px; border:1px solid var(--border);
            overflow:hidden; transition:all 0.3s ease;
            cursor:pointer; box-shadow:0 10px 25px rgba(0,0,0,0.5);
        }
        .card:hover {
            transform:translateY(-8px); box-shadow:0 25px 40px rgba(124,111,247,0.4);
            border-color:rgba(124,111,247,0.6);
        }
        .card-image {
            width:100%; height:200px; background:#1a1a2e;
            display:flex; align-items:center; justify-content:center;
            overflow:hidden; position:relative;
        }
        .card-image img {
            width:100%; height:100%; object-fit:cover;
        }
        .card-image .placeholder {
            width:100%; height:100%; display:flex; align-items:center;
            justify-content:center; font-size:3rem; color:white;
            background:linear-gradient(135deg, #2a2a4a, #1a1a3a);
        }
        .card-content {
            padding:1.3rem; display:flex; flex-direction:column; gap:0.5rem;
        }
        .card-title { font-size:1.15rem; font-weight:650; color:#f0eaff; }
        .card-tags { display:flex; flex-wrap:wrap; gap:0.4rem; margin:0.3rem 0; }
        .tag {
            background:rgba(124,111,247,0.2); padding:0.25rem 0.8rem;
            border-radius:15px; font-size:0.7rem; font-weight:600;
            text-transform:uppercase; color:#c4b8ff; border:1px solid rgba(124,111,247,0.3);
        }
        .card-footer {
            margin-top:auto; display:flex; justify-content:space-between;
            align-items:center; font-size:0.85rem; color:#9999bb;
            padding-top:0.5rem; border-top:1px solid rgba(255,255,255,0.05);
        }
        .rating { color:#ffb74d; font-weight:600; }
        .game-page {
            display:flex; flex-direction:column; gap:2rem;
            animation:fadeSlide 0.4s ease;
        }
        @keyframes fadeSlide {
            from{opacity:0; transform:translateY(15px);}
            to{opacity:1; transform:translateY(0);}
        }
        .back-btn {
            display:inline-flex; align-items:center; gap:0.5rem;
            background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
            color:#ddd; padding:0.7rem 1.5rem; border-radius:30px;
            cursor:pointer; font-size:0.9rem; font-weight:500;
            transition:0.2s; backdrop-filter:blur(10px);
        }
        .back-btn:hover { background:rgba(255,255,255,0.15); color:white; }
        .game-hero {
            display:grid; grid-template-columns:1fr 1fr; gap:2.5rem;
            background:rgba(20,22,45,0.7); backdrop-filter:blur(20px);
            border-radius:28px; padding:2.5rem; border:1px solid var(--border);
        }
        .game-cover {
            width:100%; aspect-ratio:16/10; border-radius:20px;
            overflow:hidden; display:flex; align-items:center;
            justify-content:center; background:#1a1a2e;
        }
        .game-cover img {
            width:100%; height:100%; object-fit:cover;
        }
        .game-info { display:flex; flex-direction:column; justify-content:center; gap:1.2rem; }
        .game-title { font-size:2.5rem; font-weight:700; color:#f0eaff; }
        .game-description { font-size:1.1rem; color:#d0d0e8; line-height:1.7; }
        .meta-stats { display:flex; flex-wrap:wrap; gap:2rem; font-size:1rem; color:#b9b9dc; }
        .game-details {

            gap:1.5rem; background:rgba(255,255,255,0.03);
            border-radius:20px; padding:1.8rem 2rem; border:1px solid var(--border);
        }
        .detail-item { display:flex; flex-direction:column; gap:0.3rem; }
        .detail-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:#7e7ea0; }
        .detail-value { font-size:1rem; color:#ddd; }
        .no-results { text-align:center; padding:4rem; color:#7a7aa0; font-size:1.2rem; }
        .game-count { font-size:0.9rem; color:#8888aa; margin-bottom:0.5rem; }
        footer { margin-top:2rem; text-align:center; font-size:0.85rem; color:#6b6b88; border-top:1px solid rgba(255,255,255,0.05); padding-top:2rem; }
        @media(max-width:768px) {

            .game-title { font-size:1.8rem; }
        }

        let filtered = games;
        const q = searchInput.value.trim().toLowerCase();
        if(q) filtered = filtered.filter(g => g.name.toLowerCase().includes(q) || g.tags.some(t=>t.toLowerCase().includes(q)));
        if(activeGenre) filtered = filtered.filter(g => g.tags.includes(activeGenre));
        return filtered;
    }

    function createImageWithFallback(steamId, name, container) {
        const img = document.createElement('img');
        img.src = getSteamCoverURL(steamId);
        img.alt = name;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        img.onerror = () => {
            // Если картинка не загрузилась — показываем плейсхолдер с названием
            container.innerHTML = '';
            const placeholder = document.createElement('div');
            placeholder.className = 'placeholder';
            placeholder.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:white;background:linear-gradient(135deg, #2a2a4a, #1a1a3a);text-align:center;padding:1rem;';
            placeholder.textContent = name;
            container.appendChild(placeholder);
        };
        container.innerHTML = '';
        container.appendChild(img);
    }

    function renderCatalog() {
        viewContainer.innerHTML = '';
        const filtered = getFilteredGames();
        const countDiv = document.createElement('div');
        countDiv.className = 'game-count';
        countDiv.textContent = `Найдено: ${filtered.length} из ${games.length}`;
        viewContainer.appendChild(countDiv);

        if(filtered.length === 0) {
            viewContainer.innerHTML += '<div class="no-results">🔍 Игры не найдены</div>';
            return;
        }

        const grid = document.createElement('div');
        grid.className = 'games-grid';
        filtered.forEach(game => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-image"></div>
                <div class="card-content">
                    <div class="card-title">${game.name}</div>
                    <div class="card-tags">${game.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                    <div class="card-footer">
                        <span class="rating">⭐ ${game.rating}</span>
                        <span>${game.year}</span>
                    </div>
                </div>`;
            createImageWithFallback(game.id, game.name, card.querySelector('.card-image'));
            card.onclick = ()=> window.location.hash = `#/game/${game.id}`;
            grid.appendChild(card);
        });
        viewContainer.appendChild(grid);
    }

    function renderGamePage(steamId) {
        const game = games.find(g => g.id === steamId);
        if(!game) { renderCatalog(); return; }

        viewContainer.innerHTML = '';
        const page = document.createElement('div');
        page.className = 'game-page';
        page.innerHTML = `
            <button class="back-btn">← Назад к каталогу</button>
            <div class="game-hero">
                <div class="game-cover"></div>
                <div class="game-info">
                    <h2 class="game-title">${game.name}</h2>
                    <div class="game-tags">${game.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                    <p class="game-description">${game.desc}</p>
                    <div class="meta-stats">
                        <span>⭐ ${game.rating} / 5.0</span>
                        <span>🎮 ${game.developer}</span>
                        <span>📅 ${game.year}</span>
                    </div>
                </div>
            </div>
            <div class="game-details">
                <div class="detail-item"><span class="detail-label">Разработчик</span><span class="detail-value">${game.developer}</span></div>
                <div class="detail-item"><span class="detail-label">Год</span><span class="detail-value">${game.year}</span></div>
                <div class="detail-item"><span class="detail-label">Платформы</span><span class="detail-value">Oculus Quest, SteamVR, PSVR2, HTC Vive</span></div>
                <div class="detail-item"><span class="detail-label">Рейтинг</span><span class="detail-value">${game.rating} / 5.0</span></div>
                <div class="detail-item"><span class="detail-label">Steam ID</span><span class="detail-value">${game.id}</span></div>
            </div>`;
        createImageWithFallback(game.id, game.name, page.querySelector('.game-cover'));
        page.querySelector('.back-btn').onclick = ()=> window.location.hash = '#/';
        viewContainer.appendChild(page);
    }

    function applyRouting() {
        const hash = window.location.hash.slice(1);
        const match = hash.match(/^\/game\/(\d+)$/);
        if(match) renderGamePage(parseInt(match[1]));
        else renderCatalog();
    }

    window.addEventListener('hashchange', applyRouting);
    searchInput.addEventListener('input', ()=>{
        if(!window.location.hash.startsWith('#/game/')) renderCatalog();
    });

    // Старт
    renderFilters();
    if(window.location.hash && window.location.hash !== '#/') applyRouting();
    else window.location.hash = '#/';
})();
</script>
</body>
</html>
